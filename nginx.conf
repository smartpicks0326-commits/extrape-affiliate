# Nginx config for Oracle Cloud — serves everything
# Place at: /etc/nginx/sites-available/smartpickdeals

server {
    listen 80;
    server_name smartpickdeals.live www.smartpickdeals.live;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name smartpickdeals.live www.smartpickdeals.live;

    # SSL - managed by certbot (free Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/smartpickdeals.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smartpickdeals.live/privkey.pem;

    # Serve HTML files directly from project folder
    root /home/ubuntu/extrape-affiliate;
    index index.html;

    # Static files (HTML, CSS, JS, images)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # /go/ redirects — handled by Node.js backend
    location /go/ {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # All API calls → Node.js backend
    location /api/ {
        proxy_pass http://localhost:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # Backend endpoints
    location ~ ^/(generate|status|track|compare|dashboard|flash|serp|ping|resolve) {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }
}
